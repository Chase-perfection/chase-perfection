name: Update profile SVGs

on:
  schedule:
    - cron: "0 6 * * *"      # tous les jours a 06:00 UTC
  workflow_dispatch:          # bouton "Run workflow" (declenchement manuel)
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dependances
        run: pip install --quiet Pillow

      - name: Generer la banniere terminal
        run: python scripts/generate_banner.py

      - name: Generer la carte neofetch (avatar en ASCII)
        env:
          GH_LOGIN: ${{ github.repository_owner }}
        run: python scripts/generate_info_card.py

      # Les etapes suivantes utilisent l'API GitHub.
      # Utilise ton PAT (secret GH_PAT) s'il existe, sinon le token auto de l'Action.
      - name: Generer la carte de statistiques
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: python scripts/generate_stats.py

      - name: Generer les barres de langages
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: python scripts/generate_langs.py

      - name: Generer le heatmap de contributions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GH_LOGIN: ${{ github.repository_owner }}
        run: python scripts/generate_heatmap.py

      - name: Commit si changements
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add banner.svg info-card.svg stats.svg langs.svg contrib-heatmap.svg
          git commit -m "chore: regenerate profile SVGs" || echo "Rien a committer"
          git push
